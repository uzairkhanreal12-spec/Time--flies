<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07100D">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Live Tracker</title>
<style>
  :root{
    --bg:#07100D; --panel:#0E1A16; --panel-line:#1C2E27;
    --growth:#33FF99; --growth-dim:#0F4A32;
    --failure:#FF4D4D; --failure-dim:#4A1414;
    --text:#E8F2ED; --muted:#6F8C81;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; font-family:-apple-system,'Manrope',sans-serif;}
  body{margin:0; background:var(--bg); color:var(--text); overflow:hidden;}
  .app{
    height:100vh; height:100dvh; display:flex; flex-direction:column;
    max-width:480px; margin:0 auto;
    background:
      radial-gradient(circle at 20% 0%, rgba(51,255,153,0.07), transparent 45%),
      radial-gradient(circle at 80% 100%, rgba(255,77,77,0.07), transparent 45%),
      var(--bg);
  }
  .appbar{flex:none; padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 12px;
    display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--panel-line);}
  .brand{display:flex; align-items:center; gap:9px;}
  .pulse-dot{width:10px;height:10px;border-radius:50%;background:#555;position:relative;flex:none;}
  .pulse-dot.on{background:var(--growth);}
  .pulse-dot.on::before{content:'';position:absolute;inset:-6px;border-radius:50%;
    border:1px solid var(--growth);opacity:0;animation:pulse 2s ease-out infinite;}
  @keyframes pulse{0%{transform:scale(0.5);opacity:.7;}100%{transform:scale(2.4);opacity:0;}}
  .brand h1{font-size:15px;font-weight:800;margin:0;}
  .appbar .pill{font-family:monospace;font-size:10px;color:var(--muted);
    border:1px solid var(--panel-line);padding:4px 9px;border-radius:20px;}
  .stats{flex:none; display:flex; padding:12px 16px 6px; gap:8px;}
  .stat{flex:1; text-align:center;}
  .stat .n{font-family:monospace; font-weight:700; font-size:16px;}
  .stat .l{font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-top:2px;}
  main{flex:1; min-height:0; display:flex; flex-direction:column; gap:10px; padding:6px 14px 10px;}
  .card{flex:1; min-height:0; background:var(--panel); border:1px solid var(--panel-line);
    border-radius:16px; padding:12px 12px 6px; display:flex; flex-direction:column;}
  .card-head{display:flex; align-items:center; justify-content:space-between; padding:0 2px 6px; flex:none;}
  .tag{font-family:monospace; font-size:10px; font-weight:700; letter-spacing:.07em; padding:3px 8px; border-radius:6px;}
  .tag.growth{background:var(--growth-dim); color:var(--growth);}
  .tag.failure{background:var(--failure-dim); color:var(--failure);}
  .card-val{font-family:monospace; font-size:13px; font-weight:700;}
  .chart-wrap{flex:1; min-height:0; position:relative;}
  canvas{position:absolute; inset:0; width:100%!important; height:100%!important;}
  footer{flex:none; padding:10px 14px calc(env(safe-area-inset-bottom,0px) + 12px);
    border-top:1px solid var(--panel-line); display:flex; gap:10px;}
  button{flex:1; font-weight:700; font-size:13px; padding:13px; border-radius:12px; border:none; cursor:pointer;}
  button:active{transform:scale(0.97);}
  #startBtn{background:var(--growth); color:#04140C;}
  #notifBtn{background:transparent; color:var(--text); border:1px solid var(--panel-line);}
  button:disabled{opacity:.35;}
  .toast{position:fixed; left:50%; bottom:76px; transform:translateX(-50%) translateY(20px);
    background:#12211B; border:1px solid var(--panel-line); color:var(--text);
    font-family:monospace; font-size:11px; padding:9px 14px; border-radius:20px;
    opacity:0; transition:all .3s ease; pointer-events:none; max-width:88%; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .banner{
    position:fixed; top:0; left:50%; transform:translateX(-50%) translateY(-100%);
    width:100%; max-width:480px; z-index:20;
    background:linear-gradient(90deg, var(--growth-dim), var(--panel));
    color:var(--growth); font-weight:800; font-size:13px; text-align:center;
    padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;
    border-bottom:1px solid var(--growth-dim);
    transition:transform .35s ease;
  }
  .banner.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">

  <div class="appbar">
    <div class="brand"><div class="pulse-dot" id="pulseDot"></div><h1>Live Tracker</h1></div>
    <div class="pill" id="statusPill">Idle</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="elapsedVal">00:00</div><div class="l">Elapsed</div></div>
    <div class="stat"><div class="n" id="remainingVal">15:00</div><div class="l">Remaining</div></div>
    <div class="stat"><div class="n" id="nextPing">05:00</div><div class="l">Next Ping</div></div>
  </div>

  <main>
    <div class="card">
      <div class="card-head"><span class="tag growth">GROWTH</span><span class="card-val" id="growthLatest">0</span></div>
      <div class="chart-wrap"><canvas id="growthChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-head"><span class="tag failure">FAILURE</span><span class="card-val" id="failureLatest">100</span></div>
      <div class="chart-wrap"><canvas id="failureChart"></canvas></div>
    </div>
  </main>

  <footer>
    <button id="startBtn">Start Tracking</button>
  </footer>
  <div class="banner" id="banner"></div>
  <div class="toast" id="toast"></div>
</div>

<script>
const INTERVAL_MS = 10*60*1000;
const TOTAL_MS = 15*60*60*1000;
const TOTAL_POINTS = TOTAL_MS / INTERVAL_MS;
const NOTIFY_MS = 5*60*1000;
const STORE_KEY = 'tracker-state-v1';

let state = null;
let swReg = null;
const $ = id => document.getElementById(id);

function fmt(ms){
  const s = Math.max(0, Math.floor(ms/1000));
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 3200);
}
function banner(msg){
  const b = $('banner'); b.textContent = msg; b.classList.add('show');
  clearTimeout(b._h); b._h = setTimeout(()=>b.classList.remove('show'), 4500);
}
function loadState(){
  try{ const raw = localStorage.getItem(STORE_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function saveState(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){ console.error(e); }
}
function nextGrowthValue(prev){ return Math.min(100, +(prev + 0.9 + Math.random()*1.3).toFixed(1)); }
function nextFailureValue(prev){ return Math.max(0, +(prev - 0.8 - Math.random()*1.2).toFixed(1)); }
function buildLabel(startTime, i){
  const d = new Date(startTime + i*INTERVAL_MS);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function catchUp(){
  const elapsed = Date.now() - state.startTime;
  const shouldHave = Math.min(TOTAL_POINTS, Math.floor(elapsed/INTERVAL_MS) + 1);
  const gained = shouldHave - state.growth.length;
  while(state.growth.length < shouldHave){
    const i = state.growth.length;
    const prevG = i===0 ? 0 : state.growth[i-1].y;
    const prevF = i===0 ? 100 : state.failure[i-1].y;
    state.growth.push({x: buildLabel(state.startTime,i), y: nextGrowthValue(prevG)});
    const dropped = i>0 && Math.random() < 0.18;
    state.failure.push({x: buildLabel(state.startTime,i), y: dropped ? null : nextFailureValue(prevF)});
  }
  return gained;
}

/* ---- lightweight hand-drawn line chart, zero dependencies ---- */
function resizeCanvas(canvas){
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return {ctx, w:rect.width, h:rect.height};
}
function drawChart(canvas, points, color, dashed){
  const {ctx, w, h} = resizeCanvas(canvas);
  ctx.clearRect(0,0,w,h);
  const padL=28, padR=6, padT=10, padB=18;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  const n = points.length;

  ctx.strokeStyle = '#16241F'; ctx.lineWidth = 1;
  for(let g=0; g<=4; g++){
    const y = padT + plotH*g/4;
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke();
  }
  ctx.fillStyle = '#6F8C81'; ctx.font = '9px monospace'; ctx.textAlign='right';
  [100,75,50,25,0].forEach((v,idx)=>{ ctx.fillText(v, padL-4, padT+plotH*idx/4+3); });

  if(n < 2) return;
  const xAt = i => padL + plotW * (i/(n-1));
  const yAt = v => padT + plotH * (1 - v/100);

  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.setLineDash(dashed ? [6,4] : []);
  ctx.beginPath();
  let started = false;
  for(let i=0;i<n;i++){
    const v = points[i];
    if(v === null){ started = false; continue; }
    const x = xAt(i), y = yAt(v);
    if(!started){ ctx.moveTo(x,y); started = true; } else { ctx.lineTo(x,y); }
  }
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = color;
  for(let i=0;i<n;i++){
    const v = points[i]; if(v === null) continue;
    ctx.beginPath(); ctx.arc(xAt(i), yAt(v), 2.2, 0, Math.PI*2); ctx.fill();
  }

  ctx.fillStyle = '#6F8C81'; ctx.textAlign = 'center'; ctx.font = '9px monospace';
  const step = Math.max(1, Math.floor(n/5));
  for(let i=0;i<n;i+=step){
    ctx.fillText(state.growth[i] ? state.growth[i].x : '', xAt(i), h-4);
  }
}

function renderCharts(){
  drawChart($('growthChart'), state.growth.map(p=>p.y), '#33FF99', false);
  drawChart($('failureChart'), state.failure.map(p=>p.y), '#FF4D4D', true);
  const gData = state.growth.map(p=>p.y), fData = state.failure.map(p=>p.y).filter(v=>v!==null);
  $('growthLatest').textContent = gData.at(-1) ?? 0;
  $('failureLatest').textContent = fData.at(-1) ?? 100;
}

// In-app alert only — no OS notification permission, no service worker
// messaging. This avoids permission-prompt / delivery problems entirely and
// always works the instant the app is open, which is the reliable case.
function pushNotification(title, body, tag){
  if(tag === 'five-min-ping'){
    banner(`🔔 ${body}`);
    if(navigator.vibrate) navigator.vibrate([200,100,200]);
  } else {
    toast(body);
  }
}

function tick(){
  const now = Date.now();
  const gained = catchUp();
  if(gained > 0){
    renderCharts(); saveState();
    pushNotification('Live Tracker', `Naya point add hua · #${state.growth.length}/${TOTAL_POINTS}`, 'point-update');
  }
  const elapsed = now - state.startTime;
  $('elapsedVal').textContent = fmt(elapsed);
  $('remainingVal').textContent = fmt(TOTAL_MS - elapsed);
  const sinceNotify = now - state.lastNotify;
  $('nextPing').textContent = fmt(Math.max(0, NOTIFY_MS - sinceNotify));
  if(sinceNotify >= NOTIFY_MS){
    pushNotification('Live Tracker', 'Kaam karlo boss 👀', 'five-min-ping');
    state.lastNotify = now; saveState();
  }
  if(elapsed >= TOTAL_MS){
    $('statusPill').textContent = 'Done · 15h';
    $('pulseDot').classList.remove('on');
    clearInterval(state.timer);
  }
}

async function start(){
  const now = Date.now();
  state = {startTime:now, lastNotify:now, growth:[], failure:[]};
  catchUp(); renderCharts(); saveState();
  $('statusPill').textContent = 'Live';
  $('pulseDot').classList.add('on');
  $('startBtn').textContent = 'Tracking Live';
  $('startBtn').disabled = true;
  toast('Tracking shuru — 15h, har 10 min ek point');
  setInterval(tick, 1000);
  window.addEventListener('resize', renderCharts);
}

$('startBtn').addEventListener('click', start);

(function init(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').then((reg)=>{ swReg = reg; }).catch(()=>{});
  }
  const saved = loadState();
  if(saved){
    state = saved;
    catchUp(); renderCharts();
    $('statusPill').textContent = 'Live (resumed)';
    $('pulseDot').classList.add('on');
    $('startBtn').textContent = 'Tracking Live';
    $('startBtn').disabled = true;
    toast('Resume ho gaya, waqt ke hisaab se catch-up complete');
    setInterval(tick, 1000);
    window.addEventListener('resize', renderCharts);
  }
})();
</script>
</body>
</html>
