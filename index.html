<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07100D">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Live Tracker</title>
<style>
  :root{
    --bg:#07100D; --panel:#0E1A16; --panel-line:#1C2E27;
    --growth:#33FF99; --growth-dim:#0F4A32;
    --failure:#FF4D4D; --failure-dim:#4A1414;
    --net:#5B8CFF; --net-dim:#132449;
    --text:#E8F2ED; --muted:#6F8C81;
    --card-bg:var(--panel);
  }
  body[data-theme="light"]{
    --bg:#F3F7F4; --panel:#FFFFFF; --panel-line:#DCE6E0;
    --growth-dim:#DFFBEA; --failure-dim:#FFE1E1; --net-dim:#E3EBFF;
    --text:#0E1A16; --muted:#5B6E65;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%; font-family:-apple-system,'Manrope',sans-serif;}
  body{margin:0; background:var(--bg); color:var(--text); overflow:hidden; transition:background .2s,color .2s;}
  .app{
    height:100vh; height:100dvh; display:flex; flex-direction:column;
    max-width:480px; margin:0 auto; position:relative;
    background:
      radial-gradient(circle at 20% 0%, rgba(51,255,153,0.07), transparent 45%),
      radial-gradient(circle at 80% 100%, rgba(255,77,77,0.07), transparent 45%),
      var(--bg);
  }
  .appbar{flex:none; padding:calc(env(safe-area-inset-top,0px) + 14px) 14px 12px;
    display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--panel-line);}
  .brand{display:flex; align-items:center; gap:9px;}
  .pulse-dot{width:10px;height:10px;border-radius:50%;background:#555;position:relative;flex:none;}
  .pulse-dot.on{background:var(--growth);}
  .pulse-dot.paused{background:#E0B23A;}
  .pulse-dot.on::before{content:'';position:absolute;inset:-6px;border-radius:50%;
    border:1px solid var(--growth);opacity:0;animation:pulse 2s ease-out infinite;}
  @keyframes pulse{0%{transform:scale(0.5);opacity:.7;}100%{transform:scale(2.4);opacity:0;}}
  .brand h1{font-size:15px;font-weight:800;margin:0;}
  .icon-btn{background:none;border:1px solid var(--panel-line);color:var(--text);width:32px;height:32px;
    border-radius:8px;font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;}
  .appbar-right{display:flex;gap:6px;align-items:center;}
  .pill{font-family:monospace;font-size:10px;color:var(--muted);
    border:1px solid var(--panel-line);padding:4px 9px;border-radius:20px;}

  .stats{flex:none; display:grid; grid-template-columns:repeat(4,1fr); gap:6px; padding:12px 14px 6px;}
  .stat{text-align:center;}
  .stat .n{font-family:monospace; font-weight:700; font-size:14px;}
  .stat .l{font-size:8px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-top:2px;}

  .toolbar{flex:none; display:flex; gap:6px; padding:2px 14px 8px; overflow-x:auto;}
  .chip{font-size:10px; font-family:monospace; font-weight:700; letter-spacing:.03em; padding:6px 10px;
    border-radius:20px; border:1px solid var(--panel-line); background:transparent; color:var(--muted); white-space:nowrap;}
  .chip.active{background:var(--growth-dim); color:var(--growth); border-color:transparent;}

  main{flex:1; min-height:0; display:flex; flex-direction:column; gap:8px; padding:2px 14px 8px; overflow-y:auto;}
  .card{flex:none; min-height:120px; background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0)), var(--card-bg);
    border:1px solid var(--panel-line); border-radius:18px; padding:12px 12px 6px; display:flex; flex-direction:column;
    box-shadow:0 8px 24px -12px rgba(0,0,0,0.5); backdrop-filter:blur(6px); transition:box-shadow .25s ease;}
  main.stacked .card{flex:1;}
  .card.full{flex:1 !important; min-height:340px;}
  .card.hide{display:none;}
  .card-head{display:flex; align-items:center; justify-content:space-between; padding:0 2px 6px; flex:none;}
  .tag{font-family:monospace; font-size:10px; font-weight:700; letter-spacing:.07em; padding:4px 9px; border-radius:7px;}
  .tag.growth{background:var(--growth-dim); color:var(--growth); box-shadow:0 0 12px -2px var(--growth);}
  .tag.failure{background:var(--failure-dim); color:var(--failure); box-shadow:0 0 12px -2px var(--failure);}
  .tag.net{background:var(--net-dim); color:var(--net); box-shadow:0 0 12px -2px var(--net);}
  .card-val{font-family:monospace; font-size:14px; font-weight:800; transition:color .3s ease;}
  .chart-wrap{flex:1; min-height:80px; position:relative;}
  canvas{position:absolute; inset:0; width:100%!important; height:100%!important;}
  .legend{display:flex; gap:10px; font-size:9px; font-family:monospace; color:var(--muted); padding:2px 4px 4px;}
  .legend span{display:inline-flex;align-items:center;gap:4px;}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

  footer{flex:none; padding:8px 14px calc(env(safe-area-inset-bottom,0px) + 10px);
    border-top:1px solid var(--panel-line); display:flex; gap:8px;}
  button{font-weight:700; font-size:12px; padding:12px; border-radius:12px; border:none; cursor:pointer;}
  button:active{transform:scale(0.97);}
  #startBtn{flex:2; background:var(--growth); color:#04140C;}
  #pauseBtn{flex:1; background:transparent; color:var(--text); border:1px solid var(--panel-line);}
  #addBtn{flex:1; background:var(--net-dim); color:var(--net); border:none;}
  button:disabled{opacity:.35;}

  .toast{position:fixed; left:50%; bottom:70px; transform:translateX(-50%) translateY(20px);
    background:var(--panel); border:1px solid var(--panel-line); color:var(--text);
    font-family:monospace; font-size:11px; padding:9px 14px; border-radius:20px;
    opacity:0; transition:all .3s ease; pointer-events:none; max-width:88%; text-align:center; z-index:30;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .banner{
    position:fixed; top:0; left:50%; transform:translateX(-50%) translateY(-100%);
    width:100%; max-width:480px; z-index:20;
    background:linear-gradient(90deg, var(--growth-dim), var(--panel));
    color:var(--growth); font-weight:800; font-size:13px; text-align:center;
    padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;
    border-bottom:1px solid var(--growth-dim);
    transition:transform .35s ease;
  }
  .banner.show{transform:translateX(-50%) translateY(0);}
  .banner.milestone{background:linear-gradient(90deg, var(--net-dim), var(--panel)); color:var(--net);}

  .tooltip{position:absolute; background:var(--bg); border:1px solid var(--panel-line); color:var(--text);
    font-family:monospace; font-size:10px; padding:6px 8px; border-radius:8px; pointer-events:none;
    transform:translate(-50%,-110%); white-space:nowrap; z-index:5; display:none;}

  .modal-overlay{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:40; display:none;
    align-items:flex-end; justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--panel); width:100%; max-width:480px; border-radius:18px 18px 0 0;
    padding:18px 18px calc(env(safe-area-inset-bottom,0px) + 18px); max-height:82vh; overflow-y:auto;}
  .modal h2{font-size:15px; margin:0 0 14px; display:flex; align-items:center; justify-content:space-between;}
  .modal h2 .icon-btn{width:28px;height:28px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:11px; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.05em;}
  .field input, .field select{width:100%; background:var(--bg); border:1px solid var(--panel-line); color:var(--text);
    padding:10px; border-radius:10px; font-size:13px; font-family:inherit;}
  .row2{display:flex; gap:10px;}
  .row2>.field{flex:1;}
  .seg{display:flex; gap:6px;}
  .seg button{flex:1; background:var(--bg); color:var(--muted); border:1px solid var(--panel-line);}
  .seg button.active{background:var(--growth-dim); color:var(--growth); border-color:transparent;}
  .modal .save-btn{width:100%; background:var(--growth); color:#04140C; padding:13px; margin-top:6px;}
  .session-item{border:1px solid var(--panel-line); border-radius:12px; padding:10px 12px; margin-bottom:8px;}
  .session-item .top{display:flex; justify-content:space-between; font-size:12px; font-weight:700;}
  .session-item .sub{font-size:10px; color:var(--muted); font-family:monospace; margin-top:3px;}
  .session-item .acts{display:flex; gap:8px; margin-top:8px;}
  .session-item .acts button{flex:1; padding:8px; font-size:11px; background:var(--bg); color:var(--text); border:1px solid var(--panel-line);}
  .empty{text-align:center; color:var(--muted); font-size:12px; padding:30px 0;}
</style>
</head>
<body>
<div class="app">

  <div class="appbar">
    <div class="brand"><div class="pulse-dot" id="pulseDot"></div><h1>Live Tracker</h1></div>
    <div class="appbar-right">
      <div class="pill" id="statusPill">Idle</div>
      <button class="icon-btn" id="historyBtn" title="History">🕘</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="elapsedVal">00:00</div><div class="l">Elapsed</div></div>
    <div class="stat"><div class="n" id="remainingVal">15:00</div><div class="l">Remaining</div></div>
    <div class="stat"><div class="n" id="nextPing">05:00</div><div class="l">Next Ping</div></div>
    <div class="stat"><div class="n" id="netVal">0</div><div class="l">Net Score</div></div>
  </div>

  <div class="toolbar">
    <button class="chip active" id="viewStacked">Separate</button>
    <button class="chip" id="viewCombined">Combined</button>
    <button class="chip" id="exportBtn">Export CSV</button>
    <button class="chip" id="shareBtn">Share</button>
    <button class="chip" id="endBtn">End Session</button>
  </div>

  <main class="stacked" id="mainArea">
    <div class="card" id="cardGrowth">
      <div class="card-head"><span class="tag growth">GROWTH</span><span class="card-val" id="growthLatest">0</span></div>
      <div class="chart-wrap"><canvas id="growthChart"></canvas><div class="tooltip" id="tipGrowth"></div></div>
    </div>
    <div class="card" id="cardFailure">
      <div class="card-head"><span class="tag failure">FAILURE</span><span class="card-val" id="failureLatest">100</span></div>
      <div class="chart-wrap"><canvas id="failureChart"></canvas><div class="tooltip" id="tipFailure"></div></div>
    </div>
    <div class="card" id="cardNet">
      <div class="card-head"><span class="tag net">NET SCORE</span><span class="card-val" id="netLatest">-100</span></div>
      <div class="chart-wrap"><canvas id="netChart"></canvas><div class="tooltip" id="tipNet"></div></div>
    </div>
  </main>

  <footer>
    <button id="startBtn">Start Tracking</button>
    <button id="pauseBtn">Pause</button>
    <button id="addBtn" style="display:none;">+ Point</button>
  </footer>
  <div class="banner" id="banner"></div>
  <div class="toast" id="toast"></div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsOverlay">
  <div class="modal">
    <h2>Settings <button class="icon-btn" id="closeSettings">✕</button></h2>
    <div class="field">
      <label>Theme</label>
      <div class="seg">
        <button id="themeDark" class="active">Dark</button>
        <button id="themeLight">Light</button>
      </div>
    </div>
    <div class="field">
      <label>Data Mode</label>
      <div class="seg">
        <button id="modeAuto" class="active">Auto (simulate)</button>
        <button id="modeManual">Manual entry</button>
      </div>
    </div>
    <div class="field">
      <label>Unit label (optional, e.g. Followers, ₹)</label>
      <input type="text" id="unitInput" placeholder="e.g. Followers">
    </div>
    <div class="field">
      <label>5-min alert message</label>
      <input type="text" id="alertMsgInput" placeholder="Kaam karlo boss">
    </div>
    <div class="field">
      <label>Milestone values (comma separated)</label>
      <input type="text" id="milestonesInput" placeholder="25,50,75,100">
    </div>
    <button class="save-btn" id="saveSettings">Save Settings</button>
  </div>
</div>

<!-- History Modal -->
<div class="modal-overlay" id="historyOverlay">
  <div class="modal">
    <h2>Session History <button class="icon-btn" id="closeHistory">✕</button></h2>
    <div id="historyList"></div>
  </div>
</div>

<!-- Add Point Modal -->
<div class="modal-overlay" id="addOverlay">
  <div class="modal">
    <h2>Add Manual Point <button class="icon-btn" id="closeAdd">✕</button></h2>
    <div class="row2">
      <div class="field"><label>Growth value</label><input type="number" id="manualGrowth" step="0.1"></div>
      <div class="field"><label>Failure value</label><input type="number" id="manualFailure" step="0.1"></div>
    </div>
    <button class="save-btn" id="saveManualPoint">Add Point</button>
  </div>
</div>

<!-- Session Summary Modal -->
<div class="modal-overlay" id="summaryOverlay">
  <div class="modal">
    <h2>Session Summary <button class="icon-btn" id="closeSummary">✕</button></h2>
    <div id="summaryBody"></div>
    <button class="save-btn" id="summaryOk">Done</button>
  </div>
</div>

<script>
const INTERVAL_MS = 10*60*1000;
const TOTAL_MS = 15*60*60*1000;
const TOTAL_POINTS = TOTAL_MS / INTERVAL_MS;
const NOTIFY_MS = 5*60*1000;
const STORE_KEY = 'tracker-state-v2';

let state = null;
let tickHandle = null;
const $ = id => document.getElementById(id);

const defaultSettings = { theme:'dark', mode:'auto', unit:'', alertMsg:'Kaam karlo boss', milestones:[25,50,75,100], combined:false };

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { settings:{...defaultSettings}, sessions:[], current:null };
}
function saveState(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){ console.error(e); } }

function fmt(ms){
  const s = Math.max(0, Math.floor(ms/1000));
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
function toast(msg){
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 3000);
}
function banner(msg, cls){
  const b = $('banner'); b.textContent = msg;
  b.className = 'banner show' + (cls ? ' '+cls : '');
  clearTimeout(b._h); b._h = setTimeout(()=>b.classList.remove('show'), 4200);
  if(navigator.vibrate) navigator.vibrate([200,100,200]);
}

function buildLabel(startTime, i){
  const d = new Date(startTime + i*INTERVAL_MS);
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

function currentElapsed(cur){
  const now = Date.now();
  const pausedExtra = cur.pausedAt ? (now - cur.pausedAt) : 0;
  return now - cur.startTime - cur.totalPausedMs - pausedExtra;
}

function catchUp(){
  const cur = state.current;
  if(!cur || cur.pausedAt || state.settings.mode !== 'auto') return 0;
  const elapsed = currentElapsed(cur);
  const shouldHave = Math.min(TOTAL_POINTS, Math.floor(elapsed/INTERVAL_MS) + 1);
  const before = cur.growth.length;
  while(cur.growth.length < shouldHave){
    const i = cur.growth.length;
    const prevG = i===0 ? 0 : cur.growth[i-1].y;
    const prevF = i===0 ? 100 : cur.failure[i-1].y;
    cur.growth.push({x: buildLabel(cur.startTime,i), y: Math.min(100, +(prevG + 0.9 + Math.random()*1.3).toFixed(1))});
    cur.failure.push({x: buildLabel(cur.startTime,i), y: Math.max(0, +(prevF - 0.8 - Math.random()*1.2).toFixed(1))});
  }
  return cur.growth.length - before;
}

function checkMilestones(gained){
  if(!gained) return;
  const cur = state.current;
  const lastG = cur.growth.at(-1)?.y;
  if(lastG == null) return;
  state.settings.milestones.forEach(m=>{
    if(lastG >= m && !cur.milestonesHit.includes(m)){
      cur.milestonesHit.push(m);
      banner(`🎯 Milestone: Growth hit ${m}${state.settings.unit ? ' '+state.settings.unit : ''}`, 'milestone');
    }
  });
}

/* ---- chart drawing (multi-series capable) ---- */
function resizeCanvas(canvas){
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  return {ctx, w:rect.width, h:rect.height};
}
function drawSeries(ctx, series, xAt, yAt, n, baseY){
  // collect visible (non-null) point runs so we can smooth + fill each run separately
  let runs = []; let cur = [];
  for(let i=0;i<n;i++){
    const v = series.points[i];
    if(v === null || v === undefined){ if(cur.length) runs.push(cur); cur = []; continue; }
    cur.push({i, x:xAt(i), y:yAt(v)});
  }
  if(cur.length) runs.push(cur);

  runs.forEach(run=>{
    if(run.length === 0) return;
    // gradient fill under the smooth line
    if(run.length > 1){
      const grad = ctx.createLinearGradient(0, Math.min(...run.map(p=>p.y)), 0, baseY);
      grad.addColorStop(0, series.color + '55');
      grad.addColorStop(1, series.color + '00');
      ctx.beginPath();
      ctx.moveTo(run[0].x, baseY);
      ctx.lineTo(run[0].x, run[0].y);
      for(let k=0;k<run.length-1;k++){
        const p0=run[k], p1=run[k+1];
        const midX=(p0.x+p1.x)/2, midY=(p0.y+p1.y)/2;
        ctx.quadraticCurveTo(p0.x, p0.y, midX, midY);
      }
      ctx.lineTo(run.at(-1).x, run.at(-1).y);
      ctx.lineTo(run.at(-1).x, baseY);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
    }
    // smooth stroke line
    ctx.strokeStyle = series.color; ctx.lineWidth = 2.2;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.setLineDash(series.dashed ? [7,5] : []);
    ctx.beginPath();
    ctx.moveTo(run[0].x, run[0].y);
    for(let k=0;k<run.length-1;k++){
      const p0=run[k], p1=run[k+1];
      const midX=(p0.x+p1.x)/2, midY=(p0.y+p1.y)/2;
      ctx.quadraticCurveTo(p0.x, p0.y, midX, midY);
    }
    ctx.lineTo(run.at(-1).x, run.at(-1).y);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // glowing point markers
  ctx.shadowColor = series.color; ctx.shadowBlur = 6;
  ctx.fillStyle = series.color;
  runs.forEach(run=> run.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x, p.y, 2.6, 0, Math.PI*2); ctx.fill();
  }));
  ctx.shadowBlur = 0;
}
function drawChart(canvas, seriesList, minY, maxY, labels){
  const {ctx, w, h} = resizeCanvas(canvas);
  ctx.clearRect(0,0,w,h);
  const padL=32, padR=8, padT=12, padB=20;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  const n = labels.length;
  const baseY = padT + plotH;

  ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--panel-line') || '#16241F';
  ctx.lineWidth = 1;
  for(let g=0; g<=4; g++){
    const y = padT + plotH*g/4;
    ctx.beginPath(); ctx.setLineDash([2,4]); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.fillStyle = '#6F8C81'; ctx.font = '600 9px monospace'; ctx.textAlign='right';
  for(let g=0; g<=4; g++){
    const val = Math.round(maxY - (maxY-minY)*g/4);
    ctx.fillText(val, padL-6, padT+plotH*g/4+3);
  }
  if(n < 2) return null;
  const xAt = i => padL + plotW * (i/(n-1));
  const yAt = v => padT + plotH * (1 - (v-minY)/(maxY-minY));
  seriesList.forEach(s => drawSeries(ctx, s, xAt, yAt, n, baseY));

  ctx.fillStyle = '#6F8C81'; ctx.textAlign = 'center'; ctx.font = '9px monospace';
  const step = Math.max(1, Math.floor(n/5));
  for(let i=0;i<n;i+=step){ ctx.fillText(labels[i]||'', xAt(i), h-5); }
  return {xAt, yAt, padL, padR};
}

function attachTooltip(canvas, tipEl, getSeriesFn){
  canvas.addEventListener('click', (e)=>{
    const cur = state.current; if(!cur || cur.growth.length<2) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const n = cur.growth.length;
    const padL=30, padR=6;
    const plotW = rect.width - padL - padR;
    let idx = Math.round(((x-padL)/plotW) * (n-1));
    idx = Math.max(0, Math.min(n-1, idx));
    const {label, text} = getSeriesFn(idx, cur);
    tipEl.textContent = text;
    tipEl.style.left = x + 'px';
    tipEl.style.top = '10px';
    tipEl.style.display = 'block';
    clearTimeout(tipEl._h);
    tipEl._h = setTimeout(()=>{ tipEl.style.display='none'; }, 2500);
  });
}

function renderCharts(){
  const cur = state.current;
  const cG = $('cardGrowth'), cF = $('cardFailure'), cN = $('cardNet');
  if(!cur){
    ['growthChart','failureChart','netChart'].forEach(id=>{
      const {ctx,w,h} = resizeCanvas($(id)); ctx.clearRect(0,0,w,h);
    });
    return;
  }
  const labels = cur.growth.map(p=>p.x);
  const gData = cur.growth.map(p=>p.y);
  const fData = cur.failure.map(p=>p.y);
  const netData = cur.growth.map((p,i)=> (fData[i]==null? null : +(p.y - fData[i]).toFixed(1)));

  if(state.settings.combined){
    $('mainArea').className = 'combined';
    cF.classList.add('hide'); cN.classList.add('hide'); cG.classList.add('full');
    cG.querySelector('.tag').textContent = 'GROWTH · FAILURE · NET';
    drawChart($('growthChart'), [
      {points:gData, color:'#33FF99', dashed:false},
      {points:fData, color:'#FF4D4D', dashed:true},
      {points:netData, color:'#5B8CFF', dashed:false}
    ], -100, 100, labels);
  } else {
    $('mainArea').className = 'stacked';
    cF.classList.remove('hide'); cN.classList.remove('hide'); cG.classList.remove('full');
    cG.querySelector('.tag').textContent = 'GROWTH';
    drawChart($('growthChart'), [{points:gData, color:'#33FF99', dashed:false}], 0, 100, labels);
    drawChart($('failureChart'), [{points:fData, color:'#FF4D4D', dashed:true}], 0, 100, labels);
    drawChart($('netChart'), [{points:netData, color:'#5B8CFF', dashed:false}], -100, 100, labels);
  }

  const unit = state.settings.unit ? ' '+state.settings.unit : '';
  $('growthLatest').textContent = (gData.at(-1) ?? 0) + unit;
  $('failureLatest').textContent = (fData.filter(v=>v!=null).at(-1) ?? 100) + unit;
  const lastNet = netData.filter(v=>v!=null).at(-1) ?? -100;
  $('netLatest').textContent = lastNet + unit;
  $('netVal').textContent = lastNet;
}

function pushNotification(msg){ banner('🔔 '+msg); }

function tick(){
  const cur = state.current;
  if(!cur) return;
  const now = Date.now();
  const gained = catchUp();
  if(gained > 0){
    renderCharts(); checkMilestones(gained); saveState();
    toast(`Naya point add hua · #${cur.growth.length}/${TOTAL_POINTS}`);
  }
  const elapsed = currentElapsed(cur);
  $('elapsedVal').textContent = fmt(elapsed);
  $('remainingVal').textContent = fmt(TOTAL_MS - elapsed);

  if(!cur.pausedAt){
    const sinceNotify = now - cur.lastNotify;
    $('nextPing').textContent = fmt(Math.max(0, NOTIFY_MS - sinceNotify));
    if(sinceNotify >= NOTIFY_MS){
      pushNotification(state.settings.alertMsg || 'Kaam karlo boss');
      cur.lastNotify = now; saveState();
    }
  }
  if(elapsed >= TOTAL_MS){
    finishSession(false);
  }
}

function startTicking(){
  if(tickHandle) clearInterval(tickHandle);
  tickHandle = setInterval(tick, 1000);
}

function updatePulse(){
  const cur = state.current;
  const dot = $('pulseDot');
  dot.classList.remove('on','paused');
  if(cur && cur.pausedAt){ dot.classList.add('paused'); $('statusPill').textContent='Paused'; }
  else if(cur){ dot.classList.add('on'); $('statusPill').textContent='Live'; }
  else { $('statusPill').textContent='Idle'; }
}

function startSession(){
  const now = Date.now();
  state.current = {
    id: 'S'+now, startTime: now, lastNotify: now, pausedAt:null, totalPausedMs:0,
    growth:[], failure:[], milestonesHit:[]
  };
  if(state.settings.mode === 'auto') catchUp();
  renderCharts(); saveState(); updatePulse();
  $('startBtn').textContent = 'Tracking Live';
  $('startBtn').disabled = true;
  $('pauseBtn').textContent = 'Pause';
  $('addBtn').style.display = state.settings.mode === 'manual' ? 'block' : 'none';
  toast('Tracking shuru — 15h, har 10 min ek point');
  startTicking();
}

function togglePause(){
  const cur = state.current; if(!cur) return;
  const now = Date.now();
  if(cur.pausedAt){
    cur.totalPausedMs += (now - cur.pausedAt);
    cur.pausedAt = null;
    cur.lastNotify = now;
    $('pauseBtn').textContent = 'Pause';
    toast('Resume ho gaya');
  } else {
    cur.pausedAt = now;
    $('pauseBtn').textContent = 'Resume';
    toast('Pause ho gaya');
  }
  saveState(); updatePulse();
}

function finishSession(manual){
  const cur = state.current; if(!cur) return;
  const activeMs = currentElapsed(cur);
  const gData = cur.growth.map(p=>p.y);
  const fData = cur.failure.map(p=>p.y);
  const summary = {
    id: cur.id, startTime: cur.startTime, endTime: Date.now(), activeMs,
    points: cur.growth.length,
    finalGrowth: gData.at(-1) ?? 0,
    finalFailure: fData.filter(v=>v!=null).at(-1) ?? 100,
    maxGrowth: Math.max(0,...gData), minFailure: Math.min(100,...fData.filter(v=>v!=null)),
    growth: cur.growth, failure: cur.failure
  };
  state.sessions.unshift(summary);
  state.current = null;
  clearInterval(tickHandle);
  saveState();
  renderCharts(); updatePulse();
  $('startBtn').textContent = 'Start Tracking';
  $('startBtn').disabled = false;
  $('addBtn').style.display = 'none';
  showSummary(summary);
}

function showSummary(s){
  const dur = fmt(s.activeMs ?? (s.endTime - s.startTime));
  $('summaryBody').innerHTML = `
    <div class="field"><label>Active tracking time</label><div class="card-val">${dur}</div></div>
    <div class="row2">
      <div class="field"><label>Points logged</label><div class="card-val">${s.points}/${TOTAL_POINTS}</div></div>
      <div class="field"><label>Final Net</label><div class="card-val">${(s.finalGrowth - s.finalFailure).toFixed(1)}</div></div>
    </div>
    <div class="row2">
      <div class="field"><label>Growth (final / peak)</label><div class="card-val" style="color:var(--growth)">${s.finalGrowth} / ${s.maxGrowth}</div></div>
      <div class="field"><label>Failure (final / lowest)</label><div class="card-val" style="color:var(--failure)">${s.finalFailure} / ${s.minFailure}</div></div>
    </div>`;
  $('summaryOverlay').classList.add('show');
}

/* ---- Export / Share ---- */
function toCSV(session){
  let csv = 'index,time,growth,failure,net\n';
  session.growth.forEach((p,i)=>{
    const f = session.failure[i]?.y;
    const net = (f==null) ? '' : (p.y - f).toFixed(1);
    csv += `${i+1},${p.x},${p.y},${f ?? ''},${net}\n`;
  });
  return csv;
}
function downloadCSV(session, name){
  const blob = new Blob([toCSV(session)], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name || 'tracker-session.csv';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function shareSession(session){
  const unit = state.settings.unit ? ' '+state.settings.unit : '';
  const g = session.growth.at(-1)?.y ?? 0;
  const f = session.failure.filter(p=>p.y!=null).at(-1)?.y ?? 100;
  const text = `Live Tracker update\nGrowth: ${g}${unit}\nFailure: ${f}${unit}\nNet: ${(g-f).toFixed(1)}${unit}\nPoints: ${session.growth.length}/${TOTAL_POINTS}`;
  if(navigator.share){ navigator.share({title:'Live Tracker', text}).catch(()=>{}); }
  else { navigator.clipboard?.writeText(text); toast('Summary copied to clipboard'); }
}

/* ---- History UI ---- */
function renderHistory(){
  const list = $('historyList');
  const items = [...state.sessions];
  if(state.current) items.unshift({...state.current, live:true, growth:state.current.growth, failure:state.current.failure,
    finalGrowth: state.current.growth.at(-1)?.y ?? 0, finalFailure: state.current.failure.filter(p=>p.y!=null).at(-1)?.y ?? 100,
    endTime: Date.now(), points: state.current.growth.length});
  if(items.length === 0){ list.innerHTML = '<div class="empty">Koi session nahi mila</div>'; return; }
  list.innerHTML = items.map((s,idx)=>{
    const dur = s.live ? fmt(currentElapsed(state.current)) : fmt(s.activeMs ?? (s.endTime - s.startTime));
    const date = new Date(s.startTime).toLocaleString();
    return `<div class="session-item">
      <div class="top"><span>${s.live?'🟢 Live session':'Session'}</span><span>${dur}</span></div>
      <div class="sub">${date} · ${s.points||s.growth.length} pts · Growth ${s.finalGrowth} · Failure ${s.finalFailure}</div>
      <div class="acts">
        <button data-act="csv" data-idx="${idx}" data-live="${s.live?1:0}">Export CSV</button>
        <button data-act="share" data-idx="${idx}" data-live="${s.live?1:0}">Share</button>
        ${s.live?'':'<button data-act="del" data-idx="${idx}">Delete</button>'}
      </div>
    </div>`;
  }).join('');
  list.querySelectorAll('button[data-act]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const isLive = btn.dataset.live === '1';
      const session = isLive ? {...state.current, growth:state.current.growth, failure:state.current.failure} : state.sessions[+btn.dataset.idx];
      if(btn.dataset.act === 'csv') downloadCSV(session, `tracker-${session.startTime}.csv`);
      if(btn.dataset.act === 'share') shareSession(session);
      if(btn.dataset.act === 'del'){ state.sessions.splice(+btn.dataset.idx,1); saveState(); renderHistory(); }
    });
  });
}

/* ---- Settings UI ---- */
function openSettings(){
  const s = state.settings;
  $('themeDark').classList.toggle('active', s.theme==='dark');
  $('themeLight').classList.toggle('active', s.theme==='light');
  $('modeAuto').classList.toggle('active', s.mode==='auto');
  $('modeManual').classList.toggle('active', s.mode==='manual');
  $('unitInput').value = s.unit;
  $('alertMsgInput').value = s.alertMsg;
  $('milestonesInput').value = s.milestones.join(',');
  $('settingsOverlay').classList.add('show');
}
function applyTheme(){ document.body.setAttribute('data-theme', state.settings.theme); }

/* ---- Init & wiring ---- */
function refreshAll(){
  applyTheme();
  updatePulse();
  renderCharts();
  $('addBtn').style.display = (state.current && state.settings.mode==='manual') ? 'block' : 'none';
  if(state.current){
    $('startBtn').textContent = 'Tracking Live'; $('startBtn').disabled = true;
    $('pauseBtn').textContent = state.current.pausedAt ? 'Resume' : 'Pause';
  } else {
    $('startBtn').textContent = 'Start Tracking'; $('startBtn').disabled = false;
  }
}

$('startBtn').addEventListener('click', startSession);
$('pauseBtn').addEventListener('click', togglePause);
$('endBtn').addEventListener('click', ()=>{ if(state.current) finishSession(true); else toast('Koi active session nahi'); });
$('addBtn').addEventListener('click', ()=>{ $('manualGrowth').value=''; $('manualFailure').value=''; $('addOverlay').classList.add('show'); });
$('closeAdd').addEventListener('click', ()=> $('addOverlay').classList.remove('show'));
$('saveManualPoint').addEventListener('click', ()=>{
  const cur = state.current; if(!cur){ toast('Pehle Start Tracking dabayein'); return; }
  const g = parseFloat($('manualGrowth').value), f = parseFloat($('manualFailure').value);
  if(isNaN(g) || isNaN(f)){ toast('Dono values bharein'); return; }
  const i = cur.growth.length;
  cur.growth.push({x: buildLabel(cur.startTime, i), y: g});
  cur.failure.push({x: buildLabel(cur.startTime, i), y: f});
  renderCharts(); checkMilestones(1); saveState();
  $('addOverlay').classList.remove('show');
  toast('Point add ho gaya');
});

$('viewStacked').addEventListener('click', ()=>{ state.settings.combined=false; saveState();
  $('viewStacked').classList.add('active'); $('viewCombined').classList.remove('active'); renderCharts(); });
$('viewCombined').addEventListener('click', ()=>{ state.settings.combined=true; saveState();
  $('viewCombined').classList.add('active'); $('viewStacked').classList.remove('active'); renderCharts(); });

$('exportBtn').addEventListener('click', ()=>{
  if(!state.current){ toast('Active session nahi hai'); return; }
  downloadCSV(state.current, `tracker-${state.current.startTime}.csv`);
});
$('shareBtn').addEventListener('click', ()=>{
  if(!state.current){ toast('Active session nahi hai'); return; }
  shareSession(state.current);
});

$('historyBtn').addEventListener('click', ()=>{ renderHistory(); $('historyOverlay').classList.add('show'); });
$('closeHistory').addEventListener('click', ()=> $('historyOverlay').classList.remove('show'));

$('settingsBtn').addEventListener('click', openSettings);
$('closeSettings').addEventListener('click', ()=> $('settingsOverlay').classList.remove('show'));
$('themeDark').addEventListener('click', ()=>{ $('themeDark').classList.add('active'); $('themeLight').classList.remove('active'); });
$('themeLight').addEventListener('click', ()=>{ $('themeLight').classList.add('active'); $('themeDark').classList.remove('active'); });
$('modeAuto').addEventListener('click', ()=>{ $('modeAuto').classList.add('active'); $('modeManual').classList.remove('active'); });
$('modeManual').addEventListener('click', ()=>{ $('modeManual').classList.add('active'); $('modeAuto').classList.remove('active'); });
$('saveSettings').addEventListener('click', ()=>{
  state.settings.theme = $('themeDark').classList.contains('active') ? 'dark' : 'light';
  state.settings.mode = $('modeAuto').classList.contains('active') ? 'auto' : 'manual';
  state.settings.unit = $('unitInput').value.trim();
  state.settings.alertMsg = $('alertMsgInput').value.trim() || 'Kaam karlo boss';
  state.settings.milestones = $('milestonesInput').value.split(',').map(v=>parseFloat(v.trim())).filter(v=>!isNaN(v));
  saveState();
  $('settingsOverlay').classList.remove('show');
  refreshAll();
  toast('Settings saved');
});

$('summaryOk').addEventListener('click', ()=> $('summaryOverlay').classList.remove('show'));
$('closeSummary').addEventListener('click', ()=> $('summaryOverlay').classList.remove('show'));

[document.getElementById('settingsOverlay'), document.getElementById('historyOverlay'),
 document.getElementById('addOverlay'), document.getElementById('summaryOverlay')].forEach(ov=>{
  ov.addEventListener('click', (e)=>{ if(e.target === ov) ov.classList.remove('show'); });
});

attachTooltip($('growthChart'), $('tipGrowth'), (idx,cur)=>({text:`${cur.growth[idx].x} · G:${cur.growth[idx].y}`}));
attachTooltip($('failureChart'), $('tipFailure'), (idx,cur)=>({text:`${cur.failure[idx].x} · F:${cur.failure[idx].y ?? '—'}`}));
attachTooltip($('netChart'), $('tipNet'), (idx,cur)=>{
  const f = cur.failure[idx].y;
  const net = f==null ? '—' : (cur.growth[idx].y - f).toFixed(1);
  return {text:`${cur.growth[idx].x} · Net:${net}`};
});

window.addEventListener('resize', renderCharts);

(function init(){
  state = loadState();
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }
  if(state.current) startTicking();
  refreshAll();
})();
</script>
</body>
</html>
